<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Jade &amp; York</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12362a; --surface:#16412f;
    --cream:#f6f1e3; --cream-dim:#cfc6ac;
    --line: rgba(246,241,227,0.35);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--cream);
    font-family:'Kalam', cursive; font-weight:400; line-height:1.7;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:40px 24px; text-align:center;
  }
  h1{ font-family:'Permanent Marker', cursive; font-weight:400; margin:0 0 18px; line-height:1.15; font-size:44px; }
  p{ color:var(--cream-dim); font-size:18px; margin:0 0 14px; }
  .card{ max-width:520px; }
  .rule{ width:70px; height:2px; background:var(--line); margin:28px auto; }
  .back{
    display:inline-block; margin-top:10px; color:var(--cream); text-decoration:none;
    border:1px solid var(--line); border-radius:24px; padding:10px 26px; font-weight:700;
  }
  .back:hover{ background:var(--surface); }
  .sign{ font-family:'Permanent Marker', cursive; margin-top:32px; color:var(--cream); }
</style>
</head>
<body>
  <div class="card">
    <h1>Thank You!</h1>
    <p>We've got your details — that's your stay and your plate sorted.</p>
    <p>If anything changes, just send it through again or drop us a message.</p>
    <div class="rule"></div>
    <a class="back" href="./">Back to the website</a>
    <div class="sign">Love, Jade &amp; York</div>
  </div>
</body>
</html>
